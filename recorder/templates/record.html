<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>silence · recorder</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<header class="topbar">
  <div class="brand">silence · recorder</div>
  <div class="meta">
    <span class="session-wrap">
      session <b id="session-name">{{ session_name }}</b>
      <button class="btn-sm" id="btn-sessions" title="switch session">▾</button>
      <button class="btn-sm" id="btn-new-session" title="new session">＋ new</button>
      <div class="session-dropdown" id="session-dropdown" hidden></div>
    </span>
    <span>{{ n_channels }} ch @ {{ sample_rate|int }} Hz</span>
    <span>{{ duration }}s / trial</span>
    <span>mode <b id="mode">round-robin</b></span>
    <span>total <b id="total">0</b></span>
  </div>
</header>

<main class="stage">
  <div class="state-label" id="state-label"></div>
  <div class="word" id="word">·</div>
  <div class="countdown" id="countdown"></div>
  <div class="signal-readout" id="signal-readout">&nbsp;</div>
  <div class="controls">
    <button class="btn primary" id="btn-record">Record <kbd style="background:#0f1013;color:#fff;border-color:#0f1013;margin-left:6px;">space</kbd></button>
    <button class="btn" id="btn-undo">Undo <kbd style="margin-left:6px;">U</kbd></button>
  </div>
  <div class="hint">
    <kbd>space</kbd> record &nbsp;·&nbsp; <kbd>U</kbd> undo &nbsp;·&nbsp;
    <kbd>←</kbd> <kbd>→</kbd> change word &nbsp;·&nbsp; <kbd>R</kbd> toggle mode
  </div>
</main>

<footer class="vocab-grid">
  <h3>vocabulary — click to jump</h3>
  <div class="grid" id="grid"></div>
</footer>

<div class="toast" id="toast"></div>

<script>
  window.__CFG__ = {
    vocab: {{ vocab|tojson }},
    duration: {{ duration }},
    sample_rate: {{ sample_rate }},
    n_channels: {{ n_channels }},
  };
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
